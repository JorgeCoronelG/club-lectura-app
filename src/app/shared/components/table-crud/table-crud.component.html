<table mat-table
       [dataSource]="dataSource"
       matSort
       (matSortChange)="announceSortChange($event)"
       class="mat-elevation-z8">

  <!-- Columns -->
  <ng-container [matColumnDef]="column"
                *ngFor="let column of displayedColumns">
    <ng-container *ngIf="column !== 'acciones'; else actions">
      <th mat-header-cell
          *matHeaderCellDef
          [mat-sort-header]="column"
          [sortActionDescription]="'Ordenar por {{ columnsTitle[column] }}'">
        {{ columnsTitle[column] }}
      </th>
      <td mat-cell
          *matCellDef="let element">
        {{element[column]}}
      </td>
    </ng-container>

    <ng-template #actions>
      <th mat-header-cell
          *matHeaderCellDef>
        Acciones
      </th>
      <td mat-cell
          *matCellDef="let element">
        <button mat-icon-button
                color="primary"
                aria-label="Editar"
                (click)="edit(element.id)">
          <mat-icon>edit</mat-icon>
        </button>

        <button mat-icon-button
                color="warn"
                aria-label="Eliminar"
                (click)="delete(element.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-template>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
